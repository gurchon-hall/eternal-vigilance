deck:
  name: Fire in the Belly Encore (Magic in the Valley)
  description: It was the week before the tournament when Mikey Ferguson 
    messaged me about my Fire in the Belly deck that helped me win the February 
    Tournament in the Philippines. Incidentally, I have been making tweaks to it
    so the discussion about the deck was most welcome. The most important change
    is adding a Magic of the Smith Toolbox in order to fetch an early Heart of 
    Nizchetus to improve consistency and also to fetch relevant pieces of 
    equipment later on in the game.
