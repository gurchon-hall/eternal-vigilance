deck:
  name: Anson Gun with Brujah
  description: The idea behind this version of the most iconic combat decks in 
    the game is to make it easier to manage the mid-game. Lowering the crypt cap
    from 10 to 8 makes a big difference in bringing up the third vampire. To 
    impact the whole table, you only need to perform 1 or 2 segregations. These 
    actions either burn vampires or burn pool, both of which benefit this deck. 
    With decks like this, you should focus on securing your own back, which 
    usually means rushing backwards and allowing the other players to act fairly
    freely. After removing any threats from the back, it's time to take control 
    of the table with three vampires with votes and equipped with guns.
