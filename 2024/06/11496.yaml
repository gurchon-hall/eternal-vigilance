deck:
  name: Organized Bleed Resistance
  created_by: Billy Troxel with credits to Tero Aalto and Sérgio Martins for 
    deck notes and updates.
  description: The genesis of this deck was to show that when you generously add
    Earth Meld, PRO-DOM is stronger than OBF-DOM at the bleed game, offensively 
    and defensively. Allow stealth-bleed predators to cycle some stealth so you 
    get better effect from your bounces, and if they try to lock your bouncer by
    letting you catch them, Earth Meld makes it so you are unlocked to bounce 
    the next bleed instead. When in combat with cross-table allies, Earth Meld 
    is great for friendly combat. Use Deep Song+Earth Meld to lock a bouncer 
    before lunging.
