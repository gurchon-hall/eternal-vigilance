vp_comment: "This deck starts with Norm Brown. The definition of Lafayette is combat.
  Lafayette literally means kill vampires. I faced Norm's Rail Baron's v2 Deck at
  the final table of Vidor: Taste of Vitae two years ago. Norm loves the fist and
  I love the paw. So, I thought I would leave the country and go to the city and build
  a Norm deck but, with my own flair and style. Norm relies on ILLEGALISM to promote
  combat and bleed. I just kill the biggest threat at the table. Conceding VPs is
  no problem for me. I learned from the best."
forum_post_url: https://www.vekn.net/event-calendar/event/11288
