vp_comment: I managed to get 4vp in the first round, 3 in the second (with 
  anarch brujah as both prey and predator) and 3 in the finals due to other 
  players being a lot less experienced than I was and failing to see the 
  shortcomings of the deals I proposed them. This tournament was won more by me 
  being better at manipulating the table than by being an actual good 
  card-flipper. In the finals, I had to cross-oust an anarch brujah with guns 
  because it was pretty much the only deck that could steal the victory from me,
  and since the table also didn't knew how to deal with them, they gladly helped
  me.
