event_url: https://www.vekn.net/event-calendar/event/10759
event_id: 10759
vp_comment: Went 2GW+6VP in a local, funsies 13-player tournament in Joensuu, 
  Finland. A blast to have a tournament for a change, and everyone came in good 
  spirits and aggressive decks! This is the first draft of the deck, and it has 
  good match-ups and bad match-ups. Think of it as a !Toreador breed deck, but 
  with sustained combat instead of explosive bleeds. I would definitely try to 
  cut clutter to make it a 70 or 66 card deck.
forum_post_url: 
  https://www.vekn.net/forum/event-reports-and-twd/80574-twd-dive-into-madness-joensuu-finland-4th-june-2023
