deck:
  name: Debate Club for Aspiring Vampires [by Crauseon]
  description: Went 2GW+6vp in a local, funsies 13-player tournament in Joensuu,
    Finland. A blast to have a tournament for a change, and everyone came in 
    good spirits and aggressive decks! This is the first draft of the deck, and 
    it has good match-ups and bad match-ups. Think of it as a !Toreador breed 
    deck, but with sustained combat instead of explosive bleeds. I would 
    definitely try to cut clutter to make it a 70 or 66 card deck.
