vp_comment: I set myself the challenge to try and play less AT and play other 
  decks that I think are strong or I simply like. The result has been 5 finals 
  in the last year with decks without AT (Weenie AUS, Shambling, Khazar, Carna 
  and Stanislava) and 2 tournament wins (Carna & Stanislava). I have to say that
  it feels much more powerful to play Stanislava than to play Girls in most of 
  the tables and I generally have better results playing without than with AT.
forum_post_url: 
  https://www.vekn.net/forum/event-reports-and-twd/80860-twd-body-of-sun-2-23rd-september-paris
