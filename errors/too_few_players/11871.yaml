deck:
  name: The art scam society of new kubist painters
  created_by: gotcha
  description: Once again all credit for the deck goes to my partner in crime 
    Bram, who is the mastermind behind this deck. I feel privileged to play in 
    tournaments with your creations. If someone is going to play this, adding 
    one Palla Grande might be a good idea. I would not reduce the number of 
    hearts as they saved me from many tough situations. The absolute highlight 
    of the tournament was when I had to discard two cards at the beginning of my
    turn to Constant Revolution and my predator pulled 2x Heart of Nizchetus 
    from my hand.
