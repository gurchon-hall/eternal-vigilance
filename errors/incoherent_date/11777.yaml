deck:
  name: Unmada Dabbles in Interior Decor
  description: This is a deck I've been playing with and tweaking for a while. 
    It's a stealth bleed deck with lots of anti-bounce (Revelations, Touch of 
    Clarity, and Soul Decoration) and multi-discipline cards to maximize the use
    of all six of Unmada's disciplines (he can play Forced March!) and get extra
    actions or blood for him with Dabbler. This deck really flows. Unmada's 
    ability is just amazing for cycling through and getting the needed Villeins,
    stealth, Enkil Cog, and a Dabbler every game. I often get close to or 
    completely through the 90 cards. Madman's Quill is perfect for Dabbler. If 
    anybody tries to block it as a bleed you can trigger Dabbler with a 
    obfuscate stealth card or play Changeling for an additional bleed if nobody 
    blocks. 3 Disciplines used either way. It needs someone to block it at 
    superior, but if not, you can likely play Forced March to unlock and just 
    get a blood from Dabbler instead. There used to be more Soul Decorations and
    a Hide the Mind or two for canceling Auspex bounces/intercepts, but with 
    current meta having way less big eyeballs, I removed the Hide the Mind and 
    reduced the Soul Decorations to 2 copies. There is a decent package of 
    reactions to bounce or reduce bleeds or fail a vote with superior Wrong and 
    Crosswise. I failed 2 votes in the first round when I drew both copies of 
    them early.
