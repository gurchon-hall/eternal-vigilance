vp_comment: "Description: I don't think this is necessarily anything revolutionary here but there definitely could be some
  tweaks to this version. First and foremost the new grouping can probably do this a little better and you get access to obfuscate(obviously).
  I went with this grouping simply because I prefer to have the flexibility of sensory depravation, but all and all I only
  played it once at this entire tournament and discarded it constantly, so probably better off just ditching it all together.
  Secondly, Hilariously I have Mantle of the Moon in here instead of strange day which is categorically better in every way,
  I just completely biffed that one, even though it did help me get a massive VP at the final table.The final was a little
  weird and I squeaked in with 1 GW and 4 VP's the seating was as follows:"
