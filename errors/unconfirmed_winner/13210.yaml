deck:
  name: Só Carta Justa
  created_by: Francisco Mantovanini Carvalho
  description: This deck name translates from brazilian portuguese as "Only fair
    cards". I thought of this concept because I think that the newer anarch 
    cards, specially those two that recquire barons (organized resistence and 
    bait and switch) are grossly overpowered. So yeah, I'll make a deck around 
    using those cards in the most efficient way, with the cheapest vampires 
    possible, and see how it goes. The whole concept of a gun wall came from 
    those two cards.
