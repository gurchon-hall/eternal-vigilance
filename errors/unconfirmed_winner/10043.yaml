deck:
  name: Daylily
  description: This deck is based on a similar deck I saw Randall Rudstam play 
    back in 2011. It's pretty straightforward with what it does. Get out 2-3 PRO
    ANI vamps and abuse the combo of Deep Song and Earth Meld to tap down all of
    your preys vamps and launch massive bleeds with codex and heidelburg. 
    Selectively block actions you don't like and Earth Meld out of those 
    combats.
