vp_comment: "The love affairs resumed after a lengthy break. The meta was even more
  combat-oriented than usual: I counted only two decks without significant combat
  capabilities, one of them being mine. All initial matches resulted in GWs, three
  out of five being sweeps and only one timing out. The final, however, turned out
  quite stagnant, and it's no surprise that the strongest wall won."
