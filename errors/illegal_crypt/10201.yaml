vp_comment: The last leg of the WoN Helsinki tour took things even further into the depths of Espoo, all the way to the 
  end of the metro line, Matinkylä. The venue was familiar from the Tragic Love Affair tournament series, and also 
  functions as my home. Because our apartment contains 15 chairs exactly, that was the maximum number of participants we
  could accomodate. After a last-minute cancellation, the final figure settled at 14 players.
