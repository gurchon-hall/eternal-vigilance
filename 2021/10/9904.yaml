deck:
  name: Saulot & Capuchin Team
  description: Based on M. Schumacher "Hard Boiled" deck. In my opinion it is 
    very strong toolbox-wall deck. If you are patient you should go forward with
    3 minions. At the beginning it is important to bring first Saulot and then 
    Cappuchin. Nine cards on your hand give you big advantage. I will probably 
    change/add sniper rifle and one more delaying tactics or Direct 
    Intervention.
