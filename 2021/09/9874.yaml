deck:
  created_by: Tim
  description: 'The deck is a very solid defensive deck which abuses 2 of the most
    strong defensive cards in VtES : second tradition and Earth Meld. The ousting
    power is based on a strong combo of permanent : Homunculus, +1 Bleed on Rachel
    and Madness Network. For the full package there is also perfectionist and Enkil
    Cog for the possibility to bleed for 3 during the turn of every player without
    cards nor cost. Actually having only part of the full combo can already be strong
    and Madness Network should not be defended at all cost Enkil Cog being already
    very strong.'
