winner: Emiliano Imeroni
vekn_number: 3295001
event_url: https://www.vekn.net/event-calendar/event/9913
event_id: 9913
vp_comment: 17 players assembled to fight in the first Belgian event since the 
  start of the pandemic, quite a respectable turnout given the circumstances! 
  The overall metagame seemed to favour focused/aggressive decks, with somewhat 
  fewer walls and combat than is common at these latitudes. After three 
  hard-fought rounds, Stéphane D thought he could not be in the finals with 1GW3
  and left before all games finished... thus relinquishing his finalist spot to 
  Bart.
forum_post_url: 
