  name: Burnin' and Lootin'
  description: I've wanted to try out a master module with Insurance Scam, 
    PB:Montreal, IH and dreams for a while and this time I had enough fortune on
    my side. Aksinya allows both defense and a way to flush excess 
    powerbases/scams, although at the price of a slower early game. Social charm
    should absolutely be something else, like entrancement or public trust, and 
    qui vive should probably be an animalism unlock. DeSalle was the clear mvp.
