deck:
  name: Venturing Dragons
  description: This was an attempt to combine the ousting ability of many 
    mid/low cap dominate with the cheap efficiency of Dragon's Breath Rounds. 
    The combination of range, fortitude, combat ends, intercept and bounce make 
    it tough to break down compared to pure bleed decks. A few anti-ally cards 
    were added for those who don't care much about the anti-vampire cards.
