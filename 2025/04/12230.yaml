vp_comment: 'The seventh edition of Tragic Love Affair took place as a side event
  for the Finnish Nationals. Whereas the Nationals had a somewhat surprising political
  meta, one might have expected the side event to lean more towards combat. The reality
  was actually quite bleedy, but there was huge variation: while the fastest table
  finished in 38 minutes (with five players!), there were others that timed out completely.
  The final was one of the latter.'
