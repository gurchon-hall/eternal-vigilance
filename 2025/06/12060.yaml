deck:
  name: Don't Try This At Home, a.k.a. Enema Gathering
  description: This toolboxy Creeping Sabotage deck was made from two other 
    decks smashed together, with some crypt changes afterward. One deck was an 
    Anima Gathering + Organized Resistance + Earth Meld wall. The other was a 
    Barons + Creeping Sabotage deck. The result is pretty weird. It features 
    vamps with very different jobs, but somehow managed not to jam too badly and
    snuck in some GWs.
