vp_comment: Pretty straightforward plan, get a big Vamp out use fourth tradition
  to get a second and start throwing camarilla segregations's into play without 
  regard of the results. Methuselahs will die and sometimes not in the exact 
  order you need but the constant pool damage almost always leaves you 3-4 vps 
  to collect. The deck could possibly be juiced up with some more votes that 
  deal repetitive pool damage, but the deck flows so well currently. Also do not
  forget to abuse Juliet's text when able, that extra hand size is enormous with
  a 60 card deck.
forum_post_url: https://www.vekn.net/event-calendar/event/12575
deck:
  name: New Noise
  description: This deck is inspired by something I saw David Litwin play on the
    last day of the Week of Nightmares in 2024. While it is absolutely heinous 
    and will not be making friends at most tables; in the current meta it is 
    consistently hitting 3 players at a table, before factoring in the Puppet 
    Master's. To play this deck you just have to accept collateral damage.
