event_id: 12336
vp_comment: Very happy with how the deck worked (2GW6 in the preliminary rounds 
  and 4vp in the finals it seems like a pretty good score). I had 2 very good 
  tables in which the deck played as a dream (graverobbing Fanchon and Lucinde 
  Alastor from 2 different players in the first round or playing Ancient 
  Influence and Reins when no one had vamps). Sometimes people tend to 
  overestimate the capacity of  the deck, but it works very well. The Alpha 
  Glints is an idea I had some time ago, because I wasn't very hapy with either 
  Obediences or Shadow Body. Less even with Nocturns. OK it's just for Montano 
  but we don't care much about the other vampires to be honest. I also recall 
  one league game where I managed to graverob Stanislava and then she was there 
  playing the Alpha Glints, awesome.
forum_post_url: https://www.vekn.net/event-calendar/event/12336
