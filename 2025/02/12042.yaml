deck:
  name: How Martin would play Arika
  created_by: Paul Direktor
  description: This deck is strongly inspired by Martin Weinmayer's latest TWD 
    from the 28th of December 2024, 30th Stanislava. I adapted this horrendous 
    master module to fit Arika.  Three direct interventions were maybe a bit 
    excessive and I am unsure if the voter captivation is really necessary. The 
    strong sides of this deck are its durability, especially in the early game. 
    The key to this deck is to just wait and build your board, getting key 
    actions through at the right time.
