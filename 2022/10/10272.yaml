vp_comment: In the second round, I sat between Brujah barons combat (predator) 
  and something that was either Saulot or Shalmath, the specifics escape me at 
  this point (it's been three months and I didn't take notes). The game seemed 
  quite hopeless, as my predator played erratically and an Arika deck across the
  table seemed to be getting away with everything. I was protected by S. Haven, 
  so I could concentrate on just gradually chipping at my prey's pool. My 
  grandpredator, a Gangrel horde deck, somehow managed to survive until I 
  finally got rid of Arika, and started playing at this point. He had simply too
  many minions and I didn't have enough time, so he ran over the hapless Brujah 
  and myself. Six points in total was enough to reach the final.
forum_post_url: 
